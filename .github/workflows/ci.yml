name: ci

# Non-MuJoCo suite on every push and pull request. The base package is
# dependency-free, so this proves the verifier loop + symbolic backend stay green
# across every supported Python. MuJoCo tests self-skip (pytest.importorskip).
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # tags + history for provenance/version resolution
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run non-MuJoCo test suite
        run: python -m pytest tests/ -q
      - name: Exercise the release verifier end-to-end (real git archive / tar / snapshot + gh shim)
        # F9: the flagship tool is driven over a release built from the live git
        # history — its git/tar/snapshot path and the gh download shim run on
        # every push, not just offline hand-built fixtures.
        run: >-
          python -m pytest -q
          "tests/test_verify_release.py::test_end_to_end_against_a_real_git_repo"
          "tests/test_verify_release.py::test_download_release_assets_uses_fake_gh"
          "tests/test_verify_release.py::test_resolve_remote_tag_commit_with_fake_gh"
      - name: Symbolic gold benchmark (fails on any leakage / unexpected pass)
        run: python -m csg.benchmark gold_tests --confusion --require-pass
